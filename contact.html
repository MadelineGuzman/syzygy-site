<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Syzygy Entertainment</title>
  <meta name="description" content="Contact Syzygy Entertainment to begin a project.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="noise" aria-hidden="true"></div>

  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Syzygy Entertainment home">
      <span class="brand-mark">S</span>
      <span>Syzygy Ent</span>
    </a>
    <nav class="nav-links" aria-label="Primary navigation">
      <a href="work.html">Work</a>
      <a href="services.html">Services</a>
      <a href="tools.html">Tools</a>
      <a href="about.html">About</a>
      <a class="nav-cta" href="contact.html">Contact</a>
    </nav>
    <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false">
      <span></span>
      <span></span>
    </button>
  </header>

  <main class="page-shell subpage contact-layout">
    <section class="reveal">
      <p class="eyebrow">Contact</p>
      <h1 class="page-title">Let the next project find its orbit.</h1>
      <p class="lead">Share the shape of what you are building, where it is headed, and what kind of alignment would make it easier to launch.</p>
    </section>
    <form class="contact-form reveal" action="#" method="post">
      <label>
        Name
        <input type="text" name="name" placeholder="Your name">
      </label>
      <label>
        Email
        <input type="email" name="email" placeholder="you@example.com">
      </label>
      <label>
        Project Signal
        <textarea name="message" rows="6" placeholder="Tell me what you are building..."></textarea>
      </label>
      <button class="button primary" type="submit">Send Inquiry</button>
    </form>
  </main>

  <footer class="site-footer page-shell">
    <p>Syzygy Entertainment</p>
    <a href="contact.html">Begin a project</a>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
