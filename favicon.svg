    <radialGradient id="flare" cx="0" cy="0" r="1" gradientTransform="translate(48 15) rotate(90) scale(12)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f6d07b" stop-opacity="0.95"/>
