      <stop offset="0" stop-color="#0b1021"/>
      <stop offset="0.58" stop-color="#080c18"/>
      <stop offset="1" stop-color="#04050d"/>
    </linearGradient>
    <radialGradient id="nebula" cx="0" cy="0" r="1" gradientTransform="translate(18 18) rotate(37) scale(37 34)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#183454" stop-opacity="0.52"/>
      <stop offset="0.45" stop-color="#13213d" stop-opacity="0.22"/>
